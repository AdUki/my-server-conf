# Configuration for my-server-conf setup.
# Non-secret values only. Secrets live in config.local.conf (gitignored).

# Locale settings
LOCALE_PRIMARY="en_GB.UTF-8"
LOCALE_SECONDARY="sk_SK.UTF-8"

# Extra apt packages installed alongside the essentials.
INSTALL_PACKAGES=htop

# Disk layout. All three labels are optional; setup.sh handles any subset:
#   - BOOT  : NVMe/SSD partition used for fast storage (e.g. Immich). May
#             also be the root filesystem — in that case we don't mount it
#             at /media/boot; we just place Immich data on the root FS.
#   - DATA  : HDD for bulk media (movies, music, downloads). Mounted at
#             /media/data on boot. Becomes $STORAGE_ROOT when present.
#   - BACKUP: HDD for Borg backups. Only added to fstab with `noauto,nofail`
#             — never mounted by setup.sh. Backup helpers mount/unmount it
#             on demand so the disk can spin down between weekly backups.
# Leave a value empty to skip that disk.
BOOT_PARTITION_LABEL=""
DATA_PARTITION_LABEL="data"
BACKUP_PARTITION_LABEL="backup"

# Optional override for Immich's data root. When unset, setup.sh picks:
#   1. /media/boot/immich      if BOOT is a separate (non-root) partition
#   2. /var/lib/immich-storage if BOOT label matches the root filesystem
#   3. $STORAGE_ROOT/immich    otherwise (DATA or $HOME)
IMMICH_STORAGE_ROOT=""

# LAN IP of this server. NPM proxy hosts forward to this address.
SERVER_LAN_IP="192.168.1.100"

# DuckDNS root. We assume hostnames like "<sub>.${DUCKDNS_DOMAIN}.duckdns.org".
DUCKDNS_DOMAIN="mikuda"

# Email used for Let's Encrypt registration.
LETSENCRYPT_EMAIL="simon.mikuda@gmail.com"

# Proxy hosts to seed in NPM, as "subdomain:port" pairs separated by spaces.
# Each host forwards http://SERVER_LAN_IP:port and is bound to the wildcard cert.
NPM_PROXY_HOSTS="immich:2283 graphana:3000"
